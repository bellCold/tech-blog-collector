spring:
  datasource:
    url: ${DATABASE_URL}?connectTimeout=15&socketTimeout=60&tcpKeepAlive=true
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 0
      max-lifetime: 540000
      idle-timeout: 300000
      keepalive-time: 120000
      connection-timeout: 30000
      validation-timeout: 5000
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false

server:
  port: ${PORT:8080}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
