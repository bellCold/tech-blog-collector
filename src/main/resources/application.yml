spring:
  application:
    name: practice
  datasource:
    url: jdbc:mysql://localhost:3306/tech_blog?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    show-sql: true

collector:
  cron: "0 0 */2 * * *"

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.0-flash

ollama:
  url: http://localhost:11434
  model: gemma3:4b
