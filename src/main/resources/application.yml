spring:
  application:
    name: practice
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    show-sql: true

collector:
  cron: "0 0 */2 * * *"

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.0-flash

ollama:
  url: ${OLLAMA_URL:http://localhost:11434}
  model: gemma3:27b
